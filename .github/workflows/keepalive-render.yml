name: Keep Render Alive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -fsS "https://workmy.onrender.com/api/health/ping" > /tmp/health.json
          cat /tmp/health.json
