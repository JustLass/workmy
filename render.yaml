# Blueprint opcional — conecte no Render via "New > Blueprint"
# Ou copie os comandos abaixo nas configurações manuais do Web Service.
services:
  - type: web
    name: workmy-api
    runtime: python
    plan: free
    buildCommand: cd backend && bash build.sh
    startCommand: cd backend && python -m gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      # Preencha no painel (secrets):
      # SECRET_KEY, DATABASE_URL, ALLOWED_HOSTS,
      # CORS_ALLOWED_ORIGINS, CSRF_TRUSTED_ORIGINS
