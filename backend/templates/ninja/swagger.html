{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link type="text/css" rel="stylesheet" href="{% static 'ninja/swagger-ui.css' %}">
    {% include "ninja/favicons.html" %}
    <title>{{ api.title }}</title>
</head>
<body
    data-csrf-token="{% if add_csrf %}{{ csrf_token }}{% endif %}"
    data-api-csrf="{% if add_csrf %}true{% endif %}">

    <script type="application/json" id="swagger-settings">
        {{ swagger_settings | safe }}
    </script>

    <div id="swagger-ui"></div>

    <script src="{% static 'ninja/swagger-ui-bundle.js' %}"></script>
    <script>
        const configJson = document.getElementById("swagger-settings").textContent;
        const configObject = JSON.parse(configJson);

        configObject.dom_id = "#swagger-ui";
        configObject.presets = [
            SwaggerUIBundle.presets.apis,
            SwaggerUIBundle.SwaggerUIStandalonePreset
        ];

        configObject.requestInterceptor = (req) => {
            {% if add_csrf %}
            req.headers['X-CSRFToken'] = "{{csrf_token}}";
            {% endif %}
            if (req.url.endsWith('/api/auth/login') && req.method === 'POST') {
                req.headers['Content-Type'] = 'application/x-www-form-urlencoded';
            }
            return req;
        };

        configObject.responseInterceptor = (res) => {
            if (res && res.url && res.url.includes('openapi.json')) {
                try {
                    const specObj = typeof res.obj === 'object'
                        ? res.obj
                        : JSON.parse(res.text || res.data || '{}');

                    const injectEmptyExamples = (node) => {
                        if (Array.isArray(node)) {
                            node.forEach(injectEmptyExamples);
                            return;
                        }
                        if (!node || typeof node !== 'object') return;
                        if (node.type === 'string' && node.example === undefined && node.examples === undefined) {
                            node.example = '';
                        }
                        Object.keys(node).forEach((key) => injectEmptyExamples(node[key]));
                    };

                    injectEmptyExamples(specObj);
                    const serialized = JSON.stringify(specObj);
                    res.obj = specObj;
                    res.data = serialized;
                    res.text = serialized;
                } catch (e) {
                    console.error('Erro ao ajustar exemplos do Swagger:', e);
                }
            }
            return res;
        };

        const ui = SwaggerUIBundle(configObject);

        const originalFetch = window.fetch;
        window.fetch = async (...args) => {
            const response = await originalFetch(...args);
            try {
                const req = args[0];
                const url = typeof req === "string" ? req : req.url;
                if (url.endsWith('/api/auth/login') && response.ok) {
                    const cloned = response.clone();
                    const data = await cloned.json();
                    if (data && data.access) {
                        ui.authActions.authorize({
                            AuthBearer: {
                                name: "AuthBearer",
                                schema: { type: "http", scheme: "bearer" },
                                value: data.access
                            }
                        });
                    }
                }
            } catch (e) {
                // Não interrompe o fluxo da UI se falhar parse
            }
            return response;
        };
    </script>

</body>
</html>
