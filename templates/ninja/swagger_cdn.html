<!DOCTYPE html>
<html>
<head>
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
    <link rel="icon" href="https://django-ninja.dev/img/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="https://django-ninja.dev/img/favicon.png" type="image/png">
    <title>{{ api.title }}</title>
</head>
<body>
    <div id="swagger-ui">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script type="application/json" id="swagger-settings">
        {{ swagger_settings | safe }}
    </script>
    <script>

        const configJson = document.getElementById("swagger-settings").textContent;
        const configObject = JSON.parse(configJson);

        configObject.dom_id = "#swagger-ui";
        configObject.presets = [
            SwaggerUIBundle.presets.apis,
            SwaggerUIBundle.SwaggerUIStandalonePreset
        ];
    {% if add_csrf %}
        configObject.requestInterceptor = (req) => {
            req.headers['X-CSRFToken'] = "{{csrf_token}}";
            return req;
        };
    {% endif %}

        const ui = SwaggerUIBundle(configObject);

        const nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
        const nativeTextAreaValueSetter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value').set;

        function forceSetEmpty(el, setter) {
            setter.call(el, '');
            el.defaultValue = '';
            el.removeAttribute('value');
            el.setAttribute('value', '');
            el.dispatchEvent(new Event('input', { bubbles: true }));
            el.dispatchEvent(new Event('change', { bubbles: true }));
        }

        function clearDefaultStringValues() {
            const textInputs = document.querySelectorAll('input[type="text"], input[type="password"], input[type="email"], input[type="search"], input:not([type])');
            textInputs.forEach((input) => {
                const value = (input.value || '').trim().toLowerCase();
                const placeholder = (input.getAttribute('placeholder') || '').trim().toLowerCase();
                if (value === 'string' || value === 'string($date)' || value === 'string($date-time)' || value === 'string($email)') {
                    forceSetEmpty(input, nativeInputValueSetter);
                }
                if (placeholder === 'string' || placeholder === 'string($date)' || placeholder === 'string($date-time)' || placeholder === 'string($email)') {
                    input.setAttribute('placeholder', '');
                }
            });
            const textareas = document.querySelectorAll('textarea');
            textareas.forEach((area) => {
                const value = (area.value || '').trim().toLowerCase();
                const isRequestBody = area.classList.contains('body-param__text') || !!area.closest('.body-param');
                if (isRequestBody) {
                    forceSetEmpty(area, nativeTextAreaValueSetter);
                } else if (value === 'string') {
                    forceSetEmpty(area, nativeTextAreaValueSetter);
                }
                const placeholder = (area.getAttribute('placeholder') || '').trim().toLowerCase();
                if (placeholder === 'string') {
                    area.setAttribute('placeholder', '');
                }
            });
        }

        const observer = new MutationObserver(() => clearDefaultStringValues());
        observer.observe(document.body, { childList: true, subtree: true });
        setTimeout(clearDefaultStringValues, 200);
        setTimeout(clearDefaultStringValues, 800);
        setTimeout(clearDefaultStringValues, 1500);
        setTimeout(clearDefaultStringValues, 3000);
        const clearIntervalId = setInterval(clearDefaultStringValues, 400);
        setTimeout(() => clearInterval(clearIntervalId), 10000);

        document.addEventListener('click', (event) => {
            const el = event.target;
            if (!(el instanceof Element)) return;
            if (el.closest('.try-out__btn') || el.closest('.opblock-summary') || el.closest('.btn.execute')) {
                setTimeout(clearDefaultStringValues, 50);
                setTimeout(clearDefaultStringValues, 200);
                setTimeout(clearDefaultStringValues, 600);
            }
        });

        ui.getConfigs().requestInterceptor = (req) => {
            if (req.url.endsWith('/api/auth/login') && req.method === 'POST') {
                req.headers['Content-Type'] = 'application/x-www-form-urlencoded';
            }
            return req;
        };

        const originalFetch = window.fetch;
        window.fetch = async (...args) => {
            const response = await originalFetch(...args);
            try {
                const url = typeof args[0] === "string" ? args[0] : args[0].url;
                if (url.endsWith('/api/auth/login') && response.ok) {
                    const cloned = response.clone();
                    const data = await cloned.json();
                    if (data && data.access) {
                        ui.authActions.authorize({
                            AuthBearer: {
                                name: "AuthBearer",
                                schema: { type: "http", scheme: "bearer" },
                                value: data.access
                            }
                        });
                    }
                }
            } catch (e) {
                // Ignora erros de parsing para não impactar o fluxo do Swagger
            }
            return response;
        };

    </script>
</body>
</html>
