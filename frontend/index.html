<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkMy</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#546959",
                        "surface-tint": "#496455",
                        "on-primary-container": "#98b5a3",
                        "error": "#ba1a1a",
                        "primary-container": "#2d4739",
                        "surface-bright": "#fbfbe2",
                        "on-tertiary-fixed-variant": "#424a28",
                        "on-secondary-fixed-variant": "#374b3c",
                        "surface-dim": "#dbdcc3",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "primary-fixed": "#ccead6",
                        "secondary-fixed-dim": "#b5ccb8",
                        "inverse-on-surface": "#f2f2d9",
                        "secondary": "#4e6353",
                        "on-surface-variant": "#424844",
                        "surface": "#fbfbe2",
                        "tertiary-fixed": "#dde7b9",
                        "surface-container-highest": "#e4e4cc",
                        "outline": "#727973",
                        "tertiary": "#262e0f",
                        "inverse-surface": "#303221",
                        "surface-variant": "#e4e4cc",
                        "inverse-primary": "#b0cdbb",
                        "tertiary-fixed-dim": "#c1cb9f",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#eaead1",
                        "on-primary-fixed": "#062014",
                        "background": "#fbfbe2",
                        "on-surface": "#1b1d0e",
                        "error-container": "#ffdad6",
                        "primary": "#173124",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#d1e9d4",
                        "surface-container": "#efefd7",

                        "tertiary-container": "#3c4523",
                        "secondary-container": "#d1e9d4",
                        "on-primary-fixed-variant": "#324c3e",
                        "outline-variant": "#c2c8c2",
                        "on-secondary-fixed": "#0c1f13",
                        "on-tertiary-container": "#a8b287",
                        "surface-container-low": "#f5f5dc"

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "1.5rem",
                        "xl": "2.5rem",
                        "base": "8px",
                        "md": "1rem",
                        "gutter": "1rem",
                        "container-margin": "2rem",
                        "sm": "0.5rem",
                        "xs": "0.25rem"
                    },
                    "fontFamily": {
                        "display-lg-mobile": ["Outfit"],
                        "body-md": ["Outfit"],
                        "headline-md": ["Outfit"],
                        "body-lg": ["Outfit"],
                        "label-sm": ["Outfit"],
                        "display-lg": ["Outfit"],
                        "mono-data": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "display-lg-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-sm": ["13px", {"lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "mono-data": ["14px", {"lineHeight": "20px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(73, 100, 85, 0.1);
        }
        .organic-panel {
            background: #f5f5dc;
            border: 1px solid #c2c8c2;
        }
        .organic-card {
            background: #ffffff;
            border: 1px solid rgba(114, 121, 115, 0.1);
            box-shadow: 0 4px 20px -4px rgba(73, 100, 85, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .organic-card:hover {
            box-shadow: 0 10px 30px -4px rgba(73, 100, 85, 0.12);
            transform: translateY(-2px);
        }
        .soft-shadow-green {
            box-shadow: 0 10px 30px -10px rgba(73, 100, 85, 0.12);
        }
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
