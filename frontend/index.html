<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkMy</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        // ── WorkMy Design System v3 — "Indigo / Slate / Emerald" ──
                        // Paleta harmônica de alto contraste (WCAG AA/AAA verificado).
                        // primary  = Indigo (marca/ações)   tertiary = Emerald (valores/positivo)
                        // secondary = Slate (apoio/labels)   neutros  = cinza-frio limpo
                        "primary": "#4338ca",
                        "on-primary": "#ffffff",
                        "primary-container": "#e0e7ff",
                        "on-primary-container": "#312e81",
                        "primary-fixed": "#e0e7ff",
                        "primary-fixed-dim": "#c7d2fe",
                        "on-primary-fixed": "#1e1b4b",
                        "on-primary-fixed-variant": "#3730a3",
                        "inverse-primary": "#c7d2fe",
                        "surface-tint": "#4338ca",

                        "secondary": "#4f5b76",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#dee3f0",
                        "on-secondary-container": "#2a3550",
                        "secondary-fixed": "#dee3f0",
                        "secondary-fixed-dim": "#bfc8de",
                        "on-secondary-fixed": "#2a3550",
                        "on-secondary-fixed-variant": "#3a4360",

                        "tertiary": "#0e7c66",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#cff5e7",
                        "on-tertiary-container": "#0a4a3c",
                        "tertiary-fixed": "#cff5e7",
                        "tertiary-fixed-dim": "#a3e6cf",
                        "on-tertiary-fixed": "#0a4a3c",
                        "on-tertiary-fixed-variant": "#0a4a3c",

                        "error": "#c0182b",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-error-container": "#8c0009",

                        "background": "#f6f7f9",
                        "on-background": "#1b1f2a",
                        "surface": "#ffffff",
                        "on-surface": "#1b1f2a",
                        "on-surface-variant": "#444b5a",
                        "surface-variant": "#e3e7ee",
                        "surface-dim": "#d6dbe4",
                        "surface-bright": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f1f3f6",
                        "surface-container": "#eaedf2",
                        "surface-container-high": "#e3e7ee",
                        "surface-container-highest": "#dce1ea",

                        "outline": "#737b8c",
                        "outline-variant": "#c5ccd8",
                        "inverse-surface": "#2d3340",
                        "inverse-on-surface": "#f1f3f6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "1.5rem",
                        "xl": "2.5rem",
                        "base": "8px",
                        "md": "1rem",
                        "gutter": "1rem",
                        "container-margin": "2rem",
                        "sm": "0.5rem",
                        "xs": "0.25rem"
                    },
                    "fontFamily": {
                        "display-lg-mobile": ["Outfit"],
                        "body-md": ["Outfit"],
                        "headline-md": ["Outfit"],
                        "body-lg": ["Outfit"],
                        "label-sm": ["Outfit"],
                        "display-lg": ["Outfit"],
                        "mono-data": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "display-lg-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-sm": ["13px", {"lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "mono-data": ["14px", {"lineHeight": "20px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
    <style>
        /* Helpers de superfície — tints neutros frios (slate), alinhados à paleta v3 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(67, 56, 202, 0.08);
        }
        .organic-panel {
            background: #f1f3f6;
            border: 1px solid #c5ccd8;
        }
        .organic-card {
            background: #ffffff;
            border: 1px solid rgba(27, 31, 42, 0.07);
            box-shadow: 0 4px 20px -6px rgba(30, 35, 56, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .organic-card:hover {
            box-shadow: 0 14px 34px -10px rgba(67, 56, 202, 0.14);
            transform: translateY(-2px);
        }
        .soft-shadow-green {
            box-shadow: 0 12px 30px -12px rgba(67, 56, 202, 0.18);
        }
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(27, 31, 42, 0.05), 0 2px 4px -1px rgba(27, 31, 42, 0.03);
        }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
