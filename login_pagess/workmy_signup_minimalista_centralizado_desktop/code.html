<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hero-gradient-overlay {
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1c1b1b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4b41e1;
            border-radius: 10px;
        }
    </style>

<body class="bg-background text-on-surface selection:bg-secondary-container selection:text-on-secondary-container h-screen overflow-hidden">
<main class="flex h-full w-full">
<!-- Left Side: Hero Carousel & Branding -->
<!-- Right Side: Signup Form -->
<section class="w-full h-full flex items-center justify-center p-8 md:p-16 overflow-y-auto custom-scrollbar bg-[#0b111a]">
<div class="w-full max-w-md space-y-8">
<!-- Branding for Mobile -->
<div class="lg:hidden mb-8">
<span class="font-headline-md text-headline-md font-bold text-white">WorkMy</span>
</div>
<!-- Form Header -->
<div class="space-y-2">
<h2 class="font-headline-lg text-headline-lg text-white">Create an account</h2>
<p class="font-body-md text-body-md text-[#c4c7c7]">
                        Already have an account? 
                        <a class="text-secondary hover:text-secondary-fixed transition-colors font-semibold" href="#">Log in</a>
</p>
</div>
<!-- Signup Form -->
<form class="space-y-6" id="signup-form" onsubmit="event.preventDefault();">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="font-label-md text-label-md uppercase tracking-wider text-white" for="first-name">First name</label>
<input class="w-full bg-[#1c2635] border border-[#374151] rounded-xl px-4 py-3.5 text-white placeholder-[#9ca3af] focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none" id="first-name" placeholder="Fletcher" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md uppercase tracking-wider text-white" for="last-name">Last name</label>
<input class="w-full bg-[#1c2635] border border-[#374151] rounded-xl px-4 py-3.5 text-white placeholder-[#9ca3af] focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none" id="last-name" placeholder="Last name" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md uppercase tracking-wider text-white" for="email">Email</label>
<input class="w-full bg-[#1c2635] border border-[#374151] rounded-xl px-4 py-3.5 text-white placeholder-[#9ca3af] focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none" id="email" placeholder="Email address" type="email"/>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md uppercase tracking-wider text-white" for="password">Enter your password</label>
<div class="relative group">
<input class="w-full bg-[#1c2635] border border-[#374151] rounded-xl px-4 py-3.5 text-white placeholder-[#9ca3af] focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none" id="password" placeholder="Min. 8 characters" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-white transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-3 py-2">
<input class="w-5 h-5 rounded border-none bg-primary-container text-secondary-container focus:ring-0 focus:ring-offset-0 cursor-pointer" id="terms" type="checkbox"/>
<label class="font-body-sm text-body-sm text-[#c4c7c7]" for="terms">
                            I agree to the <a class="text-white underline underline-offset-4 hover:text-secondary-fixed transition-colors" href="#">Terms &amp; Conditions</a>
</label>
</div>
<button class="w-full bg-secondary-container hover:bg-secondary-container/90 active:scale-[0.98] transition-all duration-200 py-4 rounded-xl font-button text-button text-white shadow-lg shadow-secondary/20">
                        Create account
                    </button>
</form>
<!-- Divider -->
<!-- Social Logins -->
</div>
</section>
</main>
<!-- Footer Shell (Only help/terms as per JSON) -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.innerText = 'visibility';
            }
        }

        // Add subtle animation for form entry
        document.addEventListener('DOMContentLoaded', () => {
            const formElements = document.querySelectorAll('form > div, form > button, h2, p, .social-login');
            formElements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(10px)';
                el.style.transition = 'all 0.4s ease-out';
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100 + (index * 50));
            });
        });
    </script>
<style>
        @keyframes progress {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
