<html class="dark" lang="en"><head>

                    "surface-container-lowest": "#ffffff",
                    "surface-container-highest": "#dce2f3",
                    "on-error-container": "#93000a",

                    "primary": "#000000",
                    "on-tertiary-fixed-variant": "#454748",
                    "secondary-fixed-dim": "#c3c0ff",

                    "surface-container-low": "#f0f3ff",
                    "tertiary-fixed-dim": "#c5c7c8",
                    "on-primary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-surface-variant": "#444748",
                    "primary-fixed-dim": "#c8c6c5",
                    "on-secondary-container": "#fffbff",
                    "surface": "#f9f9ff",
                    "error": "#ba1a1a",

                    "on-tertiary-fixed": "#191c1d",
                    "surface-dim": "#d3daea",

                    "on-secondary-fixed-variant": "#3323cc",
                    "tertiary": "#000000",

<style>
        body {
            background-color: #0a0f14;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        .glass-effect {
            background: rgba(21, 28, 39, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .input-dark {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease-in-out;
        }
        .input-dark:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: #4b41e1;
            box-shadow: 0 0 0 2px rgba(75, 65, 225, 0.2);
            outline: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
<!-- Top Navigation (Shell suppressed for login per instruction, but logo kept for brand identity) -->
<header class="w-full flex justify-center py-12">
<div class="font-headline-md text-headline-md font-bold text-white tracking-tighter">
            WorkMy
        </div>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop">
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Welcome Header -->
<div class="text-center mb-10">
<h1 class="font-headline-lg text-headline-lg text-white mb-2">Welcome back</h1>
<p class="font-body-md text-body-md text-on-surface-variant opacity-80">Enter your credentials to manage your workflow.</p>
</div>
<!-- Login Form -->
<div class="w-full space-y-6">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-white opacity-90 ml-1" for="email">Email</label>
<input class="input-dark w-full px-4 py-3.5 rounded-xl font-body-md text-body-md text-white placeholder-on-surface-variant placeholder:opacity-40" id="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-1">
<label class="font-label-md text-label-md text-white opacity-90" for="password">Password</label>
<a class="font-label-md text-label-md text-secondary hover:text-secondary-fixed-dim transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="input-dark w-full px-4 py-3.5 rounded-xl font-body-md text-body-md text-white placeholder-on-surface-variant placeholder:opacity-40 pr-12" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-secondary hover:bg-secondary-container text-white py-4 rounded-xl font-button text-button transition-all duration-300 shadow-lg shadow-secondary/10 active:scale-[0.98]">
                    Login
                </button>
</div>
<!-- Footer Link -->
<div class="mt-12 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-white font-semibold hover:text-secondary transition-colors ml-1" href="#">Sign up</a>
</p>
</div>
</div>
</main>
<!-- Visual Accents (Subtle Atmosphere) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute -top-[20%] -right-[10%] w-[600px] h-[600px] bg-secondary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[20%] -left-[10%] w-[500px] h-[500px] bg-secondary/5 rounded-full blur-[100px]"></div>
</div>
<!-- Minimal Footer -->
<footer class="w-full py-8 flex justify-center opacity-40">
<p class="font-label-md text-label-md text-on-surface-variant">
            © 2024 WorkMy. All rights reserved.
        </p>
</footer>
<!-- Micro-interactions -->
<script>
        // Simple password toggle logic
        document.addEventListener('DOMContentLoaded', () => {
            const passInput = document.getElementById('password');
            const toggleBtn = passInput.nextElementSibling;
            
            toggleBtn.addEventListener('click', () => {
                const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passInput.setAttribute('type', type);
                toggleBtn.querySelector('span').textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });

            // Input focus atmospheric effect
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.style.transform = 'translateY(-2px)';
                });
                input.addEventListener('blur', () => {
                    input.parentElement.style.transform = 'translateY(0)';
                });
            });
        });
    </script>
</body></html>
